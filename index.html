<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>水果店學中文遊戲</title>
<style>
body {
  font-family: "Arial", sans-serif;
  background: #fff7f0;
  text-align: center;
}

h1 {
  color: #ff7f50;
}

.container {
  margin-top: 20px;
}

.fruits {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 120px;
}

.fruit {
  font-size: 50px;
  cursor: pointer;
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  width: 100px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}

.fruit:hover {
  transform: scale(1.1);
}

.price {
  font-size: 16px;
  color: #888;
}

.emoji {
  font-size: 40px;
}

.name {
  font-size: 18px;
}

#selection {
  margin-top: 20px;
  font-size: 24px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ffb6c1;
  cursor: pointer;
}

button:hover {
  background: #ff8fab;
}

.popup {
  position: fixed;
  top: 20px;
  left: 20px;
  transform: none;
  background: white;
  padding: 20px;
  border: 3px solid #ffb6c1;
  border-radius: 20px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
  width: 300px;
}

.hidden {
  display: none;
}

#angry, #happy {
  font-size: 50px;
  margin-top: 10px;
}

/* 利潤顯示 */
#money {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 24px;
}

/* 輸入價格區 */
#priceArea {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🍎 水果店學中文 🍌</h1>

<div id="money">💰 利潤：0 元</div>

<select id="difficulty">
  <option value="easy">簡單</option>
  <option value="normal">一般</option>
  <option value="hard">魔鬼王</option>
</select>

<button onclick="startGame()">開始遊戲</button>

<div class="container hidden" id="gameArea">
  <div id="lives"></div>
  <div id="timer" style="position:fixed; bottom:20px; right:20px; font-size:24px;"></div>

  <div id="orderPopup" class="popup">
    <p id="orderText"></p>
  </div>

  <div id="angry" class="hidden">😡</div>
  <div id="happy" class="hidden">😊</div>

  <div class="fruits" id="fruitContainer"></div>

  <div id="selection">目前選擇：無</div>
  <button onclick="clearSelection()">清除</button>

  <!-- 價格輸入 -->
  <div id="priceArea" class="hidden">
    <input type="number" id="priceInput" placeholder="請輸入總價">
    <button onclick="submitPrice()">確認價格</button>
  </div>

</div>

<div id="endModal" class="modal hidden">
  <div class="modal-content">
    🎉 水果大師 🎉
  </div>
</div>

<script>

const fruits = [
	{name:"芒果", emoji:"🥭", pinyin:"máng guǒ", zhuyin:"ㄇㄤˊ ㄍㄨㄛˇ", price:60},
	{name:"草莓", emoji:"🍓", pinyin:"cǎo méi", zhuyin:"ㄘㄠˇ ㄇㄟˊ", price:10},
	{name:"蘋果", emoji:"🍎", pinyin:"píng guǒ", zhuyin:"ㄆㄧㄥˊ ㄍㄨㄛˇ", price:50},
	{name:"香蕉", emoji:"🍌", pinyin:"xiāng jiāo", zhuyin:"ㄒㄧㄤ ㄐㄧㄠ", price:20},
	{name:"橘子", emoji:"🍊", pinyin:"jú zi", zhuyin:"ㄐㄩˊ ㄗ", price:15},
	{name:"西瓜", emoji:"🍉", pinyin:"xī guā", zhuyin:"ㄒㄧ ㄍㄨㄚ", price:100}
];

let currentFruit;
let targetCount;
let selectedCount = 0;
let completed = 0;
let gameStarted = false;
let difficulty = "easy";
let lives = 3;
let timer;
let timeLeft = 5;
let money = 0;

const numberMap = {1:"一",2:"兩",3:"三",4:"四"};

function startGame(){
  difficulty = document.getElementById("difficulty").value;
  
  gameStarted = true;
  completed = 0;
  lives = 3;
  money = 0;

  updateMoney();

  document.getElementById("gameArea").classList.remove("hidden");
  updateLives();
  newOrder();
}

function newOrder(){
  /*if(!gameStarted) return; */
  if(completed >= 10){
    document.getElementById("endModal").classList.remove("hidden");
    return;
  }
  document.getElementById("priceArea").classList.add("hidden");

  selectedCount = 0;

  currentFruit = fruits[Math.floor(Math.random()*fruits.length)];
  targetCount = Math.floor(Math.random()*4)+1;

  let sentence = "";
  if(difficulty === "easy"){
    sentence = `我想要 ${numberMap[targetCount]}個 (${targetCount}) ${currentFruit.name}
	  (wǒ xiǎng yào ${numberMapPinyin(targetCount)} ge ${currentFruit.pinyin})
	  (ㄨㄛˇ ㄒㄧㄤˇ ㄧㄠˋ ${numberMapZhuyin(targetCount)} ㄍㄜˋ ${currentFruit.zhuyin})`;
  }
  else {
    sentence = `我想要 ${numberMap[targetCount]}個 (${targetCount}) ${currentFruit.name}。`;
  }
	
  document.getElementById("orderText").innerText = sentence;

  updateSelection();
}

function numberMapPinyin(n){
  return {1:"yī",2:"liǎng",3:"sān",4:"sì"}[n];
}

function numberMapZhuyin(n){
  return {1:"ㄧ",2:"ㄌㄧㄤˇ",3:"ㄙㄢ",4:"ㄙˋ"}[n];
}

function createFruits(){
  const container = document.getElementById("fruitContainer");

  fruits.forEach(f=>{
    const div = document.createElement("div");
    div.className="fruit";

    div.innerHTML = `
      <div class="emoji">${f.emoji}</div>
      <div class="name">${f.name}</div>
      <div class="price">${f.price}元</div>
    `;

    div.onclick = ()=>selectFruit(f);
    container.appendChild(div);
  });
}

function selectFruit(f){
  if(f.name !== currentFruit.name){
    showAngry();
    if(difficulty === "hard") loseLife();
    return;
  }

  selectedCount++;
  updateSelection();

  if(selectedCount === targetCount){
    document.getElementById("priceArea").classList.remove("hidden");
  }
}

function submitPrice(){
  const input = document.getElementById("priceInput");
  const playerPrice = Number(input.value);

  const correctPrice = currentFruit.price * targetCount;

  if(playerPrice > correctPrice){
    showAngry();
    loseLife();
    return;
  }

  // 成功（剛好 or 太低）
  money += playerPrice;
  updateMoney();

  showHappy();

  completed++;

  setTimeout(()=>{
    newOrder();
  },800);
}

function updateMoney(){
  document.getElementById("money").innerText = `💰 利潤：${money} 元`;
}

function showHappy(){
  const h = document.getElementById("happy");
  h.classList.remove("hidden");
  setTimeout(()=>h.classList.add("hidden"),1000);
}

function loseLife(){
  lives--;
  updateLives();

  if(lives <= 0){
    alert("💀 遊戲結束！你完成了 " + completed + " 個訂單。下次加油！");
    gameStarted = false;
  }
}

function updateSelection(){
  if(selectedCount === 0){
    document.getElementById("selection").innerText = "目前選擇：無";
  }else{
    document.getElementById("selection").innerText =
      `目前選擇：${currentFruit.emoji} x ${selectedCount}`;
  }
}

function clearSelection(){
  selectedCount = 0;
  updateSelection();
}

function showAngry(){
  const angry = document.getElementById("angry");
  angry.classList.remove("hidden");
  setTimeout(()=>angry.classList.add("hidden"),1000);
}

function updateLives(){
  if(difficulty !== "hard"){
    document.getElementById("lives").innerText = "";
    return;
  }
  document.getElementById("lives").innerText = "❤️ ".repeat(lives);
}

createFruits();
</script>

</body>
</html>
